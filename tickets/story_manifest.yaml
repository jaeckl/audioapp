# Story manifest — ~20 user stories per milestone (M00–M11).
# Full ticket bodies: AGENT.md §14. Regenerate companions: python tools/gen_companion_tickets.py
# Status: done | in_progress | todo | deferred

milestones:
  - id: M00
    name: Foundation
    theme: Repo, toolchain, shell, bridge, docs
  - id: M01
    name: First real sound
    theme: AAudio, oscillator, transport audible
  - id: M02
    name: Tracks & device strip
    theme: addTrack, select, instrument strip
  - id: M03
    name: MIDI clip playback
    theme: clips on timeline, playhead, MIDI → audio
  - id: M04
    name: Mobile MIDI editing
    theme: piano roll, note edit, grid snap
  - id: M05
    name: Save & load
    theme: project.json zip, SAF dialogs
  - id: M06
    name: Sample library & audio clips
    theme: library, import, sample clips on timeline
  - id: M07
    name: Shell, mixer & sampler UX
    theme: nav, mixer, sampler strip + fullscreen editor
  - id: M08
    name: Device chain DSP & mix
    theme: real effects, sampler DSP, solo/mute, meters
  - id: M09
    name: Offline render & export
    theme: bounce, WAV export, shareable output
  - id: M10
    name: Device chain architecture
    theme: per-device variant params, modulation dispatch, clean extensibility
  - id: M11
    name: Subtractive synth instrument
    theme: 8-voice poly, dual osc, LP12, presets — no LFO
  - id: M12
    name: ProjectEngine decomposition
    theme: per-device classes, domain services, thin ProjectEngine facade

